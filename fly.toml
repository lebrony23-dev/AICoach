# fly.toml app configuration file generated for aicoach-graceful-paper-284 on 2026-06-20T11:36:02+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aicoach-graceful-paper-284'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  # Keep at least 1 machine running to ensure nightly APScheduler routines fire on schedule
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "coach_data"
  destination = "/data"
