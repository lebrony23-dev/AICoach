# fly.toml app configuration file for aicoach-graceful-paper-284
# Configured as a 24/7 background worker for persistent APScheduler and Telegram polling.

app = 'aicoach-graceful-paper-284'
primary_region = 'syd'

[build]

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = "coach_data"
  destination = "/data"